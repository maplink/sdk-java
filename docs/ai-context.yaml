service:
  name: sdk-java
  description: SDK Java central (schemas, dtos e clientes) da plataforma.
  language: java
  framework: plain-java
  build_tool: maven

docs:
  readme: README.md
  relevant_docs:
    - docs/contexts/sdk-java-context.md

doc_sensitive_paths:
  - "**/*.java"
  - README.md

ai_review:
  focus:
    - Alterações de Schema (não quebrar compatibilidade retroativa)
    - Padrões de Builder e Jackson Mappers
